name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Strict release readiness
        env:
          CLIANY_QA_OFFLINE: "1"
        run: |
          python scripts/release_readiness.py --strict --release-tag "${{ github.ref_name }}" --report release-readiness-report.md
      - name: Upload release readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-report
          path: release-readiness-report.md
          if-no-files-found: warn

  build:
    name: Build Distribution
    needs: release-preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Clean dist
        run: rm -rf dist
      - name: Build
        run: uv build
      - name: Check distribution metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" dist/* --repo "${{ github.repository }}" --generate-notes

  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cliany-site
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
