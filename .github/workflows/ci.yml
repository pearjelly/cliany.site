# CI 流水线 — PR 检查 & 主分支保护
# 触发：PR 到 master、push 到 master
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: uv pip install -e ".[dev]" --system
      - name: Ruff 检查
        run: ruff check src/

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: uv pip install -e ".[dev]" --system
      - name: Mypy 类型检查
        run: mypy src/cliany_site/

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: 安装依赖
        run: uv pip install -e ".[test]" --system
      - name: 运行测试
        run: pytest tests/ -v --tb=short --cov=cliany_site --cov-report=xml --cov-report=term
      - name: 上传 coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn

  test-windows:
    name: Test Windows (pytest)
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: uv pip install -e ".[test]" --system
      - name: 运行核心测试 (排除 perf/qa)
        shell: cmd
        run: |
          python -m pytest -q --tb=short --no-cov --junitxml=windows-pytest.xml ^
            tests/test_agent_md.py ^
            tests/test_atomic_io.py ^
            tests/test_cli_integration.py ^
            tests/test_codegen_v2.py ^
            tests/test_config.py ^
            tests/test_cross_platform_lock.py ^
            tests/test_doctor.py ^
            tests/test_doctor_checks.py ^
            tests/test_doctor_v3.py ^
            tests/test_generated_orchestration.py ^
            tests/test_generator_v3.py ^
            tests/test_healer.py ^
            tests/test_healer_cache.py ^
            tests/test_loader_legacy.py ^
            tests/test_manifest.py ^
            tests/test_migrate.py ^
            tests/test_obscura_binary_models.py ^
            tests/test_obscura_cache_manager.py ^
            tests/test_obscura_cli_contract.py ^
            tests/test_obscura_commands_basic.py ^
            tests/test_obscura_commands_lifecycle.py ^
            tests/test_obscura_platform_matrix.py ^
            tests/test_obscura_process_manager.py ^
            tests/test_obscura_provider.py ^
            tests/test_obscura_release_manifest.py ^
            tests/test_session_scope.py ^
            tests/binary/test_process_pid_race.py
          set PYTEST_EXIT=%ERRORLEVEL%
          echo Windows smoke pytest exit code: %PYTEST_EXIT%
          python -c "import pathlib, sys, xml.etree.ElementTree as ET; p=pathlib.Path('windows-pytest.xml'); root=ET.parse(p).getroot() if p.exists() else None; suites=(root.findall('testsuite') if root is not None and root.tag == 'testsuites' else ([root] if root is not None else [])); failures=sum(int(s.get('failures', 0)) for s in suites); errors=sum(int(s.get('errors', 0)) for s in suites); print(f'Windows smoke JUnit failures={failures} errors={errors}' if root is not None else 'Windows smoke JUnit report was not created.'); sys.exit(0 if root is not None and failures + errors == 0 else 1)"
          if %ERRORLEVEL%==0 exit /b 0
          exit /b %PYTEST_EXIT%

  case-catalog:
    name: Case Catalog Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: 安装测试依赖
        run: uv pip install -e ".[test]" --system
      - name: 运行案例库离线验收
        env:
          CLIANY_QA_OFFLINE: "1"
        run: |
          python scripts/validate_cases.py --strict --report case-catalog-report.md
          pytest tests/test_validate_cases.py tests/test_cases_manifest.py -q --no-cov
      - name: 上传案例库验收报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: case-catalog-report
          path: case-catalog-report.md
          if-no-files-found: warn

  release-readiness:
    name: Release Readiness Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: 生成发布 readiness 摘要
        env:
          CLIANY_QA_OFFLINE: "1"
        run: |
          python scripts/release_readiness.py --json --report release-readiness-report.md
      - name: 上传发布 readiness 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-report
          path: release-readiness-report.md
          if-no-files-found: warn

  extract-quality:
    name: Extract Quality Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: 安装测试依赖
        run: uv pip install -e ".[test]" --system
      - name: 运行抽取质量离线回归
        env:
          CLIANY_QA_OFFLINE: "1"
        run: |
          pytest tests/test_extract_quality.py tests/test_extract_writer_quality.py tests/test_runtime_helpers_extract_quality.py tests/test_browser_part_c.py tests/test_generated_orchestration.py tests/test_search_extraction_gap_fixture.py -q --no-cov

  obscura-smoke:
    name: Obscura Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: uv pip install -e ".[test]" --system
      - name: Obscura smoke (mock-based)
        run: pytest -q tests/test_obscura_provider.py tests/test_obscura_explore_compat.py tests/test_obscura_browser_commands.py tests/test_obscura_session_recording.py tests/test_obscura_benchmark.py

  benchmark-regression:
    name: Benchmark Regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: uv pip install -e ".[test]" --system
      - name: 运行 benchmark 回归测试
        env:
          CLIANY_QA_OFFLINE: "1"
        run: pytest tests/benchmarks/ -v --no-cov
