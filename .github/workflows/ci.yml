# CI 流水线 — PR 检查 & 主分支保护
# 触发：PR 到 master、push 到 master
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: uv pip install -e ".[dev]" --system
      - name: Ruff 检查
        run: ruff check src/

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: uv pip install -e ".[dev]" --system
      - name: Mypy 类型检查
        run: mypy src/cliany_site/

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: 安装依赖
        run: uv pip install -e ".[test]" --system
      - name: 运行测试
        run: pytest tests/ -v --tb=short
