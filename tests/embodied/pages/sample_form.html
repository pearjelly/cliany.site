<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>示例表单</title>
  </head>
  <body>
    <main>
      <h1>搜索示例</h1>
      <form aria-label="搜索表单">
        <label for="query">搜索</label>
        <input id="query" name="query" type="search" aria-label="搜索" />
        <button type="submit">提交搜索</button>
      </form>

      <section role="region" aria-label="搜索结果">
        <p>结果区域</p>
      </section>
    </main>
  </body>
</html>
